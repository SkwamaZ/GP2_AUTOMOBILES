[loggers]
keys=root,cars_project

[handlers]
keys=consoleHandler,fileHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=INFO
handlers=consoleHandler,fileHandler

[logger_cars_project]
level=INFO
handlers=consoleHandler,fileHandler
qualname=cars_project
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
level=INFO
formatter=simpleFormatter
args=('logs/cars_project.log', 'a', 'utf-8')

[formatter_simpleFormatter]
format=[%(levelname)s] %(asctime)s | %(name)s | %(message)s
datefmt=%Y-%m-%d %H:%M:%S
